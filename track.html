<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeGuard | Live Tracking</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <style>
        :root {
            --primary: #FF3B30;
            --bg: #0A0A0B;
            --surface: rgba(255, 255, 255, 0.05);
            --surface-border: rgba(255, 255, 255, 0.1);
            --text: #FFFFFF;
            --text-dim: #A0A0A0;
            --glass: rgba(20, 20, 22, 0.8);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            height: 70px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--surface-border);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .logo {
            color: var(--primary);
            font-weight: 700;
            font-size: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #map {
            flex: 1;
            z-index: 1;
        }

        .info-panel {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--surface-border);
            border-radius: 20px;
            padding: 20px;
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: rgba(0, 255, 0, 0.1);
            color: #4cd964;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            width: fit-content;
        }

        .status-badge.offline {
            background: rgba(255, 59, 48, 0.1);
            color: var(--primary);
        }

        .pulse {
            width: 8px;
            height: 8px;
            background: currentColor;
            border-radius: 50%;
            animation: pulse-animation 1.5s infinite;
        }

        @keyframes pulse-animation {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(76, 217, 100, 0.7);
            }

            70% {
                transform: scale(1);
                box-shadow: 0 0 0 10px rgba(76, 217, 100, 0);
            }

            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(76, 217, 100, 0);
            }
        }

        .user-info h2 {
            margin: 0;
            font-size: 18px;
        }

        .user-info p {
            margin: 4px 0 0;
            font-size: 14px;
            color: var(--text-dim);
        }

        .last-updated {
            font-size: 11px;
            color: var(--text-dim);
            text-align: right;
        }

        /* Leaflet Overrides */
        .leaflet-container {
            background: #111 !important;
        }

        .leaflet-bar a {
            background-color: var(--glass) !important;
            color: white !important;
            border-color: var(--surface-border) !important;
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">
            <span>🛡️</span> SafeGuard LIVE
        </div>
    </header>

    <div id="map"></div>

    <div class="info-panel">
        <div id="status" class="status-badge offline">
            <div class="pulse"></div>
            <span>Connecting...</span>
        </div>
        <div class="user-info">
            <h2>Emergency Alert in Progress</h2>
            <p id="location-meta">Waiting for GPS coordinates...</p>
        </div>
        <div class="last-updated" id="timestamp"></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const sessionId = urlParams.get('id');

        if (!sessionId) {
            document.body.innerHTML = '<div style="padding: 50px; text-align: center;"><h1>Invalid Link</h1><p>No tracking ID provided.</p></div>';
        }

        // Initialize Map
        const map = L.map('map').setView([0, 0], 2);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
        }).addTo(map);

        let marker;
        let circle;
        const socket = io();

        socket.on('connect', () => {
            console.log('Connected to server');
            socket.emit('join-tracking', sessionId);
            updateStatus(true);
        });

        socket.on('disconnect', () => {
            updateStatus(false);
        });

        socket.on('location-update', (data) => {
            const { lat, lng, accuracy, timestamp } = data;
            console.log('Location update received:', data);

            const pos = [lat, lng];

            if (!marker) {
                marker = L.marker(pos).addTo(map);
                circle = L.circle(pos, { radius: accuracy || 20 }).addTo(map);
                map.setView(pos, 16);
            } else {
                marker.setLatLng(pos);
                circle.setLatLng(pos);
                if (accuracy) circle.setRadius(accuracy);
            }

            document.getElementById('location-meta').innerText = `Current Lat: ${lat.toFixed(5)}, Lng: ${lng.toFixed(5)}`;
            document.getElementById('timestamp').innerText = `Last updated: ${new Date(timestamp).toLocaleTimeString()}`;
            updateStatus(true);
        });

        function updateStatus(isOnline) {
            const el = document.getElementById('status');
            if (isOnline) {
                el.className = 'status-badge';
                el.querySelector('span').innerText = 'Live Tracking';
            } else {
                el.className = 'status-badge offline';
                el.querySelector('span').innerText = 'Disconnected';
            }
        }
    </script>
</body>

</html>
